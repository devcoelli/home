<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        VANTA.BIRDS({
          el: "#vanta",
          mouseControls: true,
          touchControls: true,
          gyroControls: false,
          minHeight: 200.0,
          minWidth: 200.0,
          scale: 1.0,
          scaleMobile: 1.0,
          backgroundAlpha: 0.0,
          color2: 0xff00f0,
          wingSpan: 40.0,
          separation: 100.0,
          alignment: 77.0,
          cohesion: 5.0,
          quantity: 2.0,
        });
        setTimeout(() => {
          const main = document.querySelector("main");
          main.style.opacity = 1;
          main.style.filter = "blur(0px)";
        }, 1000);
      });
    </script>
    <title>Rodrigo Luís Coelli - HOME @devcoelli</title>
  </head>
  <body>
    <div id="vanta"></div>
    <main>
      <header>
        <img
          src="assets/images/rodrigo.jpeg"
          alt="Rodrigo Luís Coelli Git avatar"
        />
        <h1>@devcoelli</h1>
        <h2 class="page-bioline text-fs-16 page-text-color page-text-font mt-12 ln-h-22 text-center">
                    Tecnólogo em Marketing
                </h2>
      </header>
      <ul>
        <li> 
          <a
            href="https://coelli.gitlab.io/bio/"
            target="_blank"
            rel="noreferrer noopener"
          >
            <img
              src="assets/images/homepage.svg"
              alt="home button"
              width="20"
            />
            About me
          </a>
        </li>
        <li>
          <a
            href="https://www.instagram.com/devcoelli"
            target="_blank"
            rel="noreferrer noopener"
          >
            <img src="assets/images/insta.png" alt="home button" width="20" />
            instagram</a
          >
        </li>
        <li>
          <a
            href="https://coelli.gitlab.io/office/"
            target="_blank"
            rel="noreferrer noopener"
          >
            <img src="assets/images/ProjetoIDX.png" alt="home button" width="20" />
            OFFICE</a
          >
        </li>
        <li>
          <a
            href="https://www.reddit.com/r/devcoelli/"
            target="_blank"
            rel="noreferrer noopener"
          >
            <img src="https://styles.redditmedia.com/t5_hanoet/styles/communityIcon_joqi8r6b7ctg1.png?width=64&height=64&frame=1&auto=webp&crop=64:64,smart&s=d2811236c946195ff28f9644df62db1bf0599e30" alt="home button" width="20" />
            OFFICE</a
          >
        </li>
      
      </ul>
    </main>
  </body>
</html>
